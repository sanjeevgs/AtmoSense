<!DOCTYPE html>
<html>
<head>

<title>AtmoSense</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
margin:0;
}

.header{
text-align:center;
padding:20px;
background:#020617;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
text-align:center;
}

.card p{
font-size:28px;
font-weight:600;
}

.prediction{
grid-column:span 2;
}

.chart-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:30px;
}

.chart-box{
background:#1e293b;
padding:20px;
border-radius:12px;
}

footer{
text-align:center;
padding:20px;
background:#020617;
}

</style>

</head>

<body>

<div class="header">
<h1>🌍 AtmoSense</h1>
<p>IoT Air Quality Monitoring Dashboard</p>
</div>

<div class="container">

<div class="card">
<h2>MQ2 Gas</h2>
<p id="mq2">--</p>
</div>

<div class="card">
<h2>MQ7 CO</h2>
<p id="mq7">--</p>
</div>

<div class="card">
<h2>Temperature 🌡</h2>
<p id="temp">--</p>
</div>

<div class="card">
<h2>Humidity 💧</h2>
<p id="humidity">--</p>
</div>

<div class="card prediction">
<h2>Air Quality</h2>
<p id="prediction">--</p>
</div>

</div>

<div class="chart-container">

<div class="chart-box">
<h2>MQ2 Gas Trend</h2>
<canvas id="mq2Chart"></canvas>
</div>

<div class="chart-box">
<h2>MQ7 CO Trend</h2>
<canvas id="mq7Chart"></canvas>
</div>

</div>

<footer>
ESP32 • IoT • Smart Air Monitoring
</footer>

<script src="script.js"></script>

</body>
</html>
